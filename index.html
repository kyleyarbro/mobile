<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShadowPoint</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<style>
body { margin:0; font-family:Arial; background:#0b0f14; color:#fff; }
.header { padding:14px; font-size:20px; font-weight:800; border-bottom:1px solid #222; }

.card {
  background:#131922;
  margin:10px;
  border-radius:14px;
  overflow:hidden;
}

.cardHeader {
  padding:12px;
  font-size:18px;
  font-weight:800;
  cursor:pointer;
}

.cardBody {
  padding:12px;
  display:none;
}

.open .cardBody { display:block; }

.section { margin-top:10px; }

input {
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid #333;
  background:#1a2330;
  color:#fff;
}

button {
  padding:8px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  margin-top:6px;
  margin-right:6px;
}

.red { background:#dc2626; }
.orange { background:#d97706; }
.green { background:#16a34a; }

.pill {
  display:inline-block;
  padding:4px 8px;
  border-radius:999px;
  font-size:12px;
  margin-right:4px;
}

.task {
  display:flex;
  justify-content:space-between;
  margin-top:4px;
}
</style>
</head>

<body>

<div class="header">ShadowPoint</div>
<div id="app">Loading...</div>

<script>
const supabase = window.supabase.createClient(
  "https://hulcxftmoazrvkjqqyuk.supabase.co",
  "sb_publishable_yFa3GaBBsHYn-VfK8ivRJQ__vuu_q2T"
);

async function loadCases() {
  const container = document.getElementById("app");
  container.innerHTML = "Loading...";

  try {
    const res = await supabase
      .from("bail_intakes")
      .select("*")
      .limit(50);

    if (!res.data || res.data.length === 0) {
      container.innerHTML = "No cases found";
      return;
    }

    container.innerHTML = "";

    res.data.forEach(c => {
      const name = c.defendant_name || c.name || "NO NAME";

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="cardHeader" onclick="toggleCard(this)">
          ${name}
        </div>

        <div class="cardBody" id="body-${c.id}">
          Loading details...
        </div>
      `;

      container.appendChild(card);

      // LOAD DETAILS AFTER RENDER (NON-BLOCKING)
      loadDetails(c.id);
    });

  } catch (err) {
    container.innerHTML = "Error: " + err.message;
  }
}

function toggleCard(el) {
  el.parentElement.classList.toggle("open");
}

async function loadDetails(id) {
  const body = document.getElementById("body-" + id);

  try {
    const [notesRes, tasksRes, alertsRes] = await Promise.all([
      supabase.from("field_notes").select("*").eq("defendant_id", id),
      supabase.from("tasks").select("*").eq("defendant_id", id),
      supabase.from("alerts").select("*").eq("defendant_id", id)
    ]);

    const notes = notesRes.data || [];
    const tasks = tasksRes.data || [];
    const alerts = alertsRes.data || [];

    body.innerHTML = `
      <div class="section">
        ${alerts.map(a =>
          `<span class="pill ${a.type}">${a.message}</span>`
        ).join("")}
      </div>

      <div class="section">
        <strong>Notes</strong>
        ${notes.map(n => `<div>• ${n.note}</div>`).join("")}
        <input placeholder="Add note"
          onkeydown="if(event.key==='Enter'){addNote('${id}', this.value); this.value=''}">
      </div>

      <div class="section">
        <strong>Tasks</strong>
        ${tasks.map(t => `
          <div class="task">
            <span>${t.completed ? "✔ " : ""}${t.title}</span>
            <button onclick="toggleTask('${t.id}', ${t.completed})">
              ${t.completed ? "Undo" : "Done"}
            </button>
          </div>
        `).join("")}
        <input placeholder="New task"
          onkeydown="if(event.key==='Enter'){addTask('${id}', this.value); this.value=''}">
      </div>

      <div class="section">
        <strong>Alerts</strong><br>
        <button class="red" onclick="addAlert('${id}','red')">🔴</button>
        <button class="orange" onclick="addAlert('${id}','orange')">🟠</button>
        <button class="green" onclick="addAlert('${id}','green')">🟢</button>
      </div>
    `;

  } catch (err) {
    body.innerHTML = "Error loading details";
  }
}

async function addNote(id, text) {
  if (!text) return;
  await supabase.from("field_notes").insert({ defendant_id:id, note:text });
  loadDetails(id);
}

async function addTask(id, text) {
  if (!text) return;
  await supabase.from("tasks").insert({ defendant_id:id, title:text, completed:false });
  loadDetails(id);
}

async function toggleTask(id, current) {
  await supabase.from("tasks").update({ completed:!current }).eq("id", id);
  loadDetails(id);
}

async function addAlert(id, type) {
  const message = prompt("Alert message:");
  if (!message) return;

  await supabase.from("alerts").insert({
    defendant_id:id,
    type,
    message
  });

  loadDetails(id);
}

loadCases();
</script>

</body>
</html>
