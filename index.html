<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ShadowPoint</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#0b0f14;color:#fff}
.card{background:#131922;margin:10px;padding:12px;border-radius:12px;border:1px solid #253041}
.header{cursor:pointer}
.name{font-weight:800;font-size:18px}
.body{display:none;margin-top:10px}
.card.open .body{display:block}
button{margin:4px;padding:8px;border:none;border-radius:8px;background:#2563eb;color:#fff}
</style>
</head>

<body>

<div id="list"></div>

<script>
const supabase = window.supabase.createClient(
"https://hulcxftmoazrvkjqqyuk.supabase.co",
"sb_publishable_yFa3GaBBsHYn-VfK8ivRJQ__vuu_q2T"
);

let data = [];
let openSet = new Set();

function toggle(id){
  if(openSet.has(id)) openSet.delete(id);
  else openSet.add(id);
  render();
}

async function load(){
  const { data:rows } = await supabase
    .from("bail_intakes")
    .select("*")
    .order("created_at",{ascending:false});

  data = rows || [];
  render();
}

function render(){
  document.getElementById("list").innerHTML =
    data.map(d=>{
      const open = openSet.has(d.id);

      return `
      <div class="card ${open ? "open":""}">
        <div class="header" onclick="toggle('${d.id}')">
          <div class="name">${d.defendant_name || "Unnamed"}</div>
          <div>${d.status || ""}</div>
        </div>

        <div class="body">
          <div>Phone: ${d.phone || ""}</div>
          <div>Address: ${d.address || ""}</div>

          <button onclick="event.stopPropagation(); quick('${d.id}','contact')">Contact</button>
          <button onclick="event.stopPropagation(); quick('${d.id}','not located')">Not Located</button>
        </div>
      </div>
      `;
    }).join("");
}

async function quick(id,label){
  await supabase.from("watchtower_events").insert({
    bail_intake_id:id,
    event_type:label
  });
}

load();
</script>

</body>
</html>
