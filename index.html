<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ShadowPoint" />
  <title>ShadowPoint</title>

  <link rel="manifest" href="./watchtower_v4_manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#0b0f14; --panel:#131922; --panel2:#1a2330; --text:#eef2f7; --muted:#98a2b3;
      --border:#253041; --blue:#2563eb; --green:#16a34a; --orange:#d97706; --red:#dc2626;
      --pill:#1f2937; --shadow:0 8px 28px rgba(0,0,0,.28);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font:15px/1.35 Arial,sans-serif}
    body{padding-bottom:84px}
    button,input,select,textarea{font:inherit}
    .app{max-width:1200px;margin:0 auto}
    .topbar{position:sticky;top:0;z-index:40;background:rgba(11,15,20,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:max(12px, env(safe-area-inset-top)) 14px 12px}
    .title{font-size:22px;font-weight:800}
    .sub{font-size:12px;color:var(--muted);margin-top:2px}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .between{display:flex;justify-content:space-between;align-items:center;gap:10px}
    .toolbar{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
    .toolbar input,.toolbar select,.form input,.form textarea,.form select{
      width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:12px;color:var(--text);padding:12px
    }
    .statbar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 14px 0}
    .stat,.notice,.card,.event,.field{background:var(--panel);border:1px solid var(--border);box-shadow:var(--shadow)}
    .stat{border-radius:14px;padding:10px;min-height:74px}
    .stat .label{font-size:11px;color:var(--muted);text-transform:uppercase}
    .stat .num{font-size:24px;font-weight:800;margin-top:4px}
    .notice{margin:12px 14px 0;border-radius:14px;padding:12px;white-space:pre-wrap}
    .tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 14px 0}
    .tab{border:1px solid var(--border);background:var(--panel);color:var(--text);padding:12px;border-radius:14px;font-weight:800}
    .tab.active{background:var(--blue)}
    .content{padding:12px 14px}
    .list,.activity{display:grid;gap:12px}
    .card{border-radius:18px;overflow:hidden}
    details.card{padding:0}
    summary{list-style:none;cursor:pointer;padding:14px}
    summary::-webkit-details-marker{display:none}
    .summaryWrap{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
    .name{font-size:20px;font-weight:800;line-height:1.1}
    .pillbar{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
    .pill{background:var(--pill);border:1px solid var(--border);border-radius:999px;padding:5px 9px;font-size:12px;font-weight:700}
    .pill.red{background:#3a1719}
    .pill.orange{background:#3e2b12}
    .pill.green{background:#143420}
    .summaryLine{margin-top:10px;color:var(--muted);font-size:13px}
    .collapseIcon{font-size:18px;font-weight:900;transition:transform .15s ease;min-width:20px;text-align:center}
    details[open] .collapseIcon{transform:rotate(180deg)}
    .cardBody{padding:0 14px 14px 14px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
    .field{border-radius:12px;padding:10px}
    .field .k{font-size:11px;color:var(--muted);text-transform:uppercase}
    .field .v{font-weight:700;margin-top:4px;word-break:break-word}
    .actions{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px}
    .btn{border:0;border-radius:14px;padding:12px;font-weight:800;color:#fff;cursor:pointer}
    .btn.blue{background:var(--blue)}
    .btn.gray{background:#374151}
    .btn.green{background:var(--green)}
    .btn.orange{background:var(--orange)}
    .btn.red{background:var(--red)}
    .mini{font-size:12px}
    .event{border-radius:14px;padding:12px}
    .event .t{font-weight:800}
    .event .m{color:var(--muted);font-size:12px;margin-top:4px}
    .hidden{display:none!important}
    .modalBack{position:fixed;inset:0;background:rgba(0,0,0,.66);z-index:80;display:none;align-items:flex-end;justify-content:center;padding:0}
    .sheet{width:100%;max-width:860px;max-height:92vh;overflow:auto;background:var(--bg);border-top-left-radius:22px;border-top-right-radius:22px;border:1px solid var(--border);box-shadow:var(--shadow);padding:14px 14px calc(18px + env(safe-area-inset-bottom))}
    .sheetHeader{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
    .sheetTitle{font-size:18px;font-weight:800}
    .close{background:#374151;border:0;color:#fff;border-radius:12px;padding:10px 12px;font-weight:800}
    .form{display:grid;gap:10px}
    .desktop{display:none}
    .floating{position:fixed;right:14px;bottom:calc(94px + env(safe-area-inset-bottom));z-index:45;border-radius:999px;padding:14px 16px;font-size:18px;background:var(--blue);color:#fff;border:0;box-shadow:var(--shadow);font-weight:900}
    .bottomnav{position:fixed;left:0;right:0;bottom:0;z-index:50;background:rgba(11,15,20,.98);border-top:1px solid var(--border);padding:10px 14px calc(10px + env(safe-area-inset-bottom))}
    .bottomnav .row{justify-content:space-between}
    .live{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
    .dot{width:9px;height:9px;border-radius:999px;background:#4b5563}
    .dot.on{background:#16a34a}
    .dot.off{background:#dc2626}
    @media (min-width:900px){
      body{padding-bottom:24px}
      .app{padding:0 12px}
      .toolbar{grid-template-columns:1.6fr .9fr .9fr .8fr}
      .statbar{grid-template-columns:repeat(6,1fr)}
      .tabs{grid-template-columns:repeat(3,1fr)}
      .content{display:grid;grid-template-columns:1.25fr .95fr;gap:14px}
      .desktop{display:block}
      .bottomnav,.floating{display:none}
      .actions{grid-template-columns:repeat(3,1fr)}
      .grid2{grid-template-columns:repeat(4,1fr)}
      .sheet{border-radius:22px;margin:24px;max-height:88vh}
      .modalBack{align-items:center;padding:24px}
    }
  </style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="between">
      <div>
        <div class="title">ShadowPoint Watchtower</div>
        <div class="sub">Realtime phone, iPad, and laptop sync through Supabase</div>
      </div>
      <div class="row desktop">
        <span class="live"><span id="liveDotDesktop" class="dot off"></span><span id="liveTextDesktop">Realtime offline</span></span>
        <button class="btn blue mini" id="refreshBtnDesktop" type="button">Refresh</button>
        <button class="btn blue mini" id="newBtnDesktop" type="button">New Defendant</button>
      </div>
    </div>
    <div class="toolbar">
      <input id="searchInput" placeholder="Search defendant, county, case, address" />
      <select id="statusFilter">
        <option value="">All Statuses</option>
        <option>Open</option>
        <option>Missed Court</option>
        <option>Missed Payment</option>
        <option>In Recovery</option>
        <option>Closed</option>
      </select>
      <select id="viewFilter">
        <option value="priority">Priority View</option>
        <option value="recovery">Recovery Board</option>
        <option value="all">All Cases</option>
        <option value="watchlist">Watchlist Only</option>
      </select>
      <select id="sortFilter">
        <option value="risk">Risk First</option>
        <option value="court">Court Date</option>
        <option value="newest">Newest First</option>
      </select>
    </div>
  </header>

  <section class="statbar">
    <div class="stat"><div class="label">Visible</div><div class="num" id="statTotal">0</div></div>
    <div class="stat"><div class="label">High Risk</div><div class="num" id="statHigh">0</div></div>
    <div class="stat"><div class="label">Missed Court</div><div class="num" id="statMissed">0</div></div>
    <div class="stat"><div class="label">Recovery</div><div class="num" id="statRecovery">0</div></div>
    <div class="stat"><div class="label">Court ≤ 2 Days</div><div class="num" id="statSoon">0</div></div>
    <div class="stat desktop"><div class="label">Recent Events</div><div class="num" id="statEvents">0</div></div>
  </section>

  <div id="statusBox" class="notice">Starting...</div>

  <section class="tabs">
    <button class="tab active" id="tabTargets" type="button">Targets</button>
    <button class="tab" id="tabActivity" type="button">Recent Activity</button>
    <button class="tab desktop" id="tabHigh" type="button">High Risk Only</button>
  </section>

  <section class="content">
    <div><div class="list" id="targetList"></div></div>
    <div class="desktop"><div class="list" id="activityList"></div></div>
  </section>
</div>

<button class="floating" id="newBtnMobile" type="button">＋</button>

<nav class="bottomnav">
  <div class="row">
    <div class="row">
      <span class="live"><span id="liveDotMobile" class="dot off"></span><span id="liveTextMobile">Realtime offline</span></span>
    </div>
    <div class="row">
      <button class="btn gray mini" id="refreshBtnMobile" type="button">Refresh</button>
      <button class="btn gray mini" id="forcePollBtn" type="button">Resync</button>
    </div>
  </div>
</nav>

<div class="modalBack" id="noteBack">
  <div class="sheet">
    <div class="sheetHeader">
      <div class="sheetTitle">Quick Field Note</div>
      <button class="close" id="closeNoteBtn" type="button">Close</button>
    </div>
    <div class="form">
      <input id="noteName" disabled />
      <textarea id="noteText" rows="6" placeholder="Log what happened. Keep it quick and useful."></textarea>
      <button class="btn blue" id="saveNoteBtn" type="button">Save Note</button>
    </div>
  </div>
</div>

<div class="modalBack" id="detailBack">
  <div class="sheet">
    <div class="sheetHeader">
      <div class="sheetTitle">Defendant Activity</div>
      <button class="close" id="closeDetailBtn" type="button">Close</button>
    </div>
    <div id="detailContent"></div>
  </div>
</div>

<div class="modalBack" id="newBack">
  <div class="sheet">
    <div class="sheetHeader">
      <div class="sheetTitle">New Defendant</div>
      <button class="close" id="closeNewBtn" type="button">Close</button>
    </div>
    <div class="form">
      <input id="f_name" placeholder="Defendant Name" />
      <input id="f_dob" type="date" />
      <input id="f_phone" placeholder="Phone" />
      <select id="f_status">
        <option>Open</option>
        <option>Missed Court</option>
        <option>Missed Payment</option>
        <option>In Recovery</option>
        <option>Closed</option>
      </select>
      <input id="f_county" placeholder="County" />
      <input id="f_case" placeholder="Case Number" />
      <input id="f_court" type="date" />
      <input id="f_address" placeholder="Address" />
      <input id="f_cosigner" placeholder="Cosigner Name" />
      <input id="f_cosigner_phone" placeholder="Cosigner Phone" />
      <textarea id="f_notes" rows="4" placeholder="Notes"></textarea>
      <button class="btn blue" id="saveNewBtn" type="button">Save Defendant</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://hulcxftmoazrvkjqqyuk.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_yFa3GaBBsHYn-VfK8ivRJQ__vuu_q2T";
const API_BASE = SUPABASE_URL + "/rest/v1";
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let allRows = [];
let allEvents = [];
let eventMap = {};
let noteTarget = null;
let currentTab = "targets";
let realtimeChannel = null;
let reconnectTimer = null;
let pollTimer = null;
let pendingRefresh = false;
let lastSyncLabel = "";
const openCards = new Set();

const $ = (id) => document.getElementById(id);

function esc(v){
  return String(v ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function setStatus(msg,error=false){
  const box = $("statusBox");
  box.textContent = msg;
  box.style.borderColor = error ? "#7f1d1d" : "#253041";
  box.style.background = error ? "#2b1215" : "#131922";
  box.style.color = error ? "#fecaca" : "#eef2f7";
  if(!error) lastSyncLabel = msg;
}

function setRealtimeState(online, text){
  ["liveDotDesktop","liveDotMobile"].forEach(id => {
    const el = $(id);
    if(el) el.className = "dot " + (online ? "on" : "off");
  });
  ["liveTextDesktop","liveTextMobile"].forEach(id => {
    const el = $(id);
    if(el) el.textContent = text;
  });
}

async function api(path, options={}){
  const res = await fetch(API_BASE + path, {
    method: options.method || "GET",
    headers: {
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": "Bearer " + SUPABASE_ANON_KEY,
      "Content-Type": "application/json",
      "Prefer": options.prefer || "return=representation"
    },
    body: options.body ? JSON.stringify(options.body) : undefined
  });

  const text = await res.text();
  let data = null;
  try { data = text ? JSON.parse(text) : null; } catch { data = text; }

  if(!res.ok){
    throw new Error(
      data?.message ||
      data?.error_description ||
      (typeof data === "string" ? data : `HTTP ${res.status}`)
    );
  }

  return data;
}

function daysUntil(dateStr){
  if(!dateStr) return null;
  const today = new Date();
  const d = new Date(dateStr + "T00:00:00");
  const start = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  return Math.floor((d - start) / 86400000);
}

function recentEventsFor(id){
  return eventMap[id] || [];
}

function riskScore(row){
  let score = 0;
  const status = (row.status || "").toLowerCase();

  if(status === "missed court") score += 40;
  if(status === "in recovery") score += 35;
  if(status === "missed payment") score += 20;
  if(row.watchlist === true) score += 15;
  if(row.aliases) score += 10;
  if(!row.phone) score += 8;
  if(!row.address) score += 8;

  const dd = daysUntil(row.court_date);
  if(dd !== null){
    if(dd < 0 && status !== "closed") score += 15;
    if(dd >= 0 && dd <= 2) score += 12;
  }

  const evs = recentEventsFor(row.id);
  if(evs.some(e => e.event_type === "house_possible_hiding")) score += 20;
  if(evs.some(e => e.event_type === "house_vehicle_present")) score += 10;
  if(evs.some(e => e.event_type === "not_located")) score += 8;
  if(evs.some(e => e.event_type === "defendant_located")) score -= 20;

  return Math.max(score, 0);
}

function riskPill(score){
  if(score >= 60) return '<span class="pill red">Urgent</span>';
  if(score >= 40) return '<span class="pill orange">High Risk</span>';
  if(score >= 20) return '<span class="pill">Medium</span>';
  return '<span class="pill green">Lower</span>';
}

function statusPill(status){
  const s = (status || "Open").toLowerCase();
  if(s === "missed court") return '<span class="pill red">Missed Court</span>';
  if(s === "missed payment") return '<span class="pill orange">Missed Payment</span>';
  if(s === "in recovery") return '<span class="pill orange">In Recovery</span>';
  if(s === "closed") return '<span class="pill green">Closed</span>';
  return '<span class="pill">Open</span>';
}

function sortedFilteredRows(){
  const q = $("searchInput").value.trim().toLowerCase();
  const status = $("statusFilter").value;
  const view = $("viewFilter").value;
  const sort = $("sortFilter").value;

  let rows = [...allRows].filter(r => {
    const hay = [
      r.defendant_name || r.name || "",
      r.phone || "",
      r.county || "",
      r.case_number || "",
      r.address || "",
      r.cosigner_name || ""
    ].join(" ").toLowerCase();

    if(q && !hay.includes(q)) return false;
    if(status && (r.status || "") !== status) return false;
    if(view === "recovery" && !["Missed Court","Missed Payment","In Recovery"].includes(r.status || "")) return false;
    if(view === "watchlist" && r.watchlist !== true) return false;
    if(view === "priority" && riskScore(r) < 20 && !["Missed Court","In Recovery"].includes(r.status || "")) return false;
    return true;
  });

  if(currentTab === "high"){
    rows = rows.filter(r => riskScore(r) >= 40);
  }

  if(sort === "court"){
    rows.sort((a,b) => (a.court_date || "9999-12-31").localeCompare(b.court_date || "9999-12-31"));
  } else if(sort === "newest"){
    rows.sort((a,b) => (b.created_at || "").localeCompare(a.created_at || ""));
  } else {
    rows.sort((a,b) => riskScore(b) - riskScore(a));
  }

  return rows;
}

function syncOpenCardsFromDom(){
  document.querySelectorAll("details[data-case-id]").forEach(el => {
    const id = el.getAttribute("data-case-id");
    if(el.open) openCards.add(id);
    else openCards.delete(id);
  });
}

function renderTargets(){
  const rows = sortedFilteredRows();

  $("statTotal").textContent = rows.length;
  $("statHigh").textContent = rows.filter(r => riskScore(r) >= 40).length;
  $("statMissed").textContent = rows.filter(r => r.status === "Missed Court").length;
  $("statRecovery").textContent = rows.filter(r => r.status === "In Recovery").length;
  $("statSoon").textContent = rows.filter(r => {
    const d = daysUntil(r.court_date);
    return d !== null && d >= 0 && d <= 2;
  }).length;
  $("statEvents").textContent = allEvents.length;

  if(!rows.length){
    $("targetList").innerHTML = '<div class="card" style="padding:14px"><div class="name">No matching cases</div><div class="sub">Adjust filters or add a new defendant.</div></div>';
    return;
  }

  $("targetList").innerHTML = rows.map(r => {
    const risk = riskScore(r);
    const dd = daysUntil(r.court_date);
    const next = dd === null ? "No date" : dd < 0 ? `${Math.abs(dd)}d past` : `${dd}d`;
    const name = r.defendant_name || r.name || "Unnamed";
    const recent = recentEventsFor(r.id).slice(0,2);
    const isOpen = openCards.has(r.id) ? "open" : "";

    return `
      <details class="card" data-case-id="${r.id}" ${isOpen}>
        <summary>
          <div class="summaryWrap">
            <div>
              <div class="name">${esc(name)}</div>
              <div class="pillbar">
                ${statusPill(r.status)}
                ${riskPill(risk)}
                <span class="pill">Risk ${risk}</span>
                <span class="pill">${esc(r.county || "No County")}</span>
              </div>
              <div class="summaryLine">
                Case ${esc(r.case_number || "N/A")} · Court ${esc(r.court_date || "N/A")} (${esc(next)})
              </div>
            </div>
            <div class="collapseIcon">⌄</div>
          </div>
        </summary>

        <div class="cardBody">
          <div class="grid2">
            <div class="field"><div class="k">Case #</div><div class="v">${esc(r.case_number || "N/A")}</div></div>
            <div class="field"><div class="k">Court</div><div class="v">${esc(r.court_date || "N/A")} <span class="sub">(${esc(next)})</span></div></div>
            <div class="field"><div class="k">Phone</div><div class="v">${esc(r.phone || "N/A")}</div></div>
            <div class="field"><div class="k">Address</div><div class="v">${esc(r.address || "N/A")}</div></div>
          </div>

          <div class="actions">
            <button class="btn blue" data-stop type="button" onclick="openNote('${r.id}')">Log Action</button>
            <button class="btn gray" data-stop type="button" onclick="openDetails('${r.id}')">See Notes</button>
            <button class="btn red" data-stop type="button" onclick="setStatusAction('${r.id}','Missed Court','Marked Missed Court')">Missed Court</button>
            <button class="btn orange" data-stop type="button" onclick="setStatusAction('${r.id}','In Recovery','Recovery Started')">Start Recovery</button>
            <button class="btn gray" data-stop type="button" onclick="quickEvent('${r.id}','not_located','Not Located','Attempt made but defendant not located.')">Not Located</button>
            <button class="btn green" data-stop type="button" onclick="quickEvent('${r.id}','contact_made','Contact Made','Contact made in the field.')">Contact Made</button>
          </div>

          <div class="activity" style="margin-top:12px">
            ${recent.length ? recent.map(e => `
              <div class="event">
                <div class="t">${esc(e.event_label || e.event_type || 'Event')}</div>
                <div class="m">${esc(formatDateTime(e.created_at))}</div>
                <div style="margin-top:6px">${esc(e.details || '')}</div>
              </div>
            `).join('') : '<div class="event"><div class="t">No recent activity</div><div class="m">Log actions from your phone in the field.</div></div>'}
          </div>
        </div>
      </details>
    `;
  }).join("");

  document.querySelectorAll("details[data-case-id]").forEach(el => {
    el.addEventListener("toggle", () => {
      const id = el.getAttribute("data-case-id");
      if(el.open) openCards.add(id);
      else openCards.delete(id);
    });
  });

  document.querySelectorAll("[data-stop]").forEach(btn => {
    btn.addEventListener("click", (e) => e.stopPropagation());
  });
}

function renderActivity(){
  const events = [...allEvents].slice(0,60);

  const html = events.length ? events.map(e => {
    const r = allRows.find(x => x.id === e.bail_intake_id);
    const name = r ? (r.defendant_name || r.name || "Unnamed") : "Unknown";
    return `
      <div class="event">
        <div class="t">${esc(e.event_label || e.event_type || "Event")} · ${esc(name)}</div>
        <div class="m">${esc(formatDateTime(e.created_at))}</div>
        <div style="margin-top:6px">${esc(e.details || "")}</div>
      </div>
    `;
  }).join("") : '<div class="event"><div class="t">No activity yet</div></div>';

  $("activityList").innerHTML = html;

  if(window.innerWidth < 900){
    if(currentTab === "activity") $("targetList").innerHTML = html;
    else renderTargets();
  }
}

function renderAll(){
  renderTargets();
  renderActivity();
}

async function loadData(showMessage=true){
  if(pendingRefresh) return;
  pendingRefresh = true;

  try{
    if(showMessage) setStatus("Syncing defendants and recent field activity...");

    allRows = await api("/bail_intakes?select=id,created_at,updated_at,defendant_name,name,phone,status,county,case_number,court_date,address,notes,watchlist,aliases,cosigner_name,cosigner_phone&order=created_at.desc&limit=300") || [];

    try{
      allEvents = await api("/watchtower_events?select=id,bail_intake_id,event_type,event_label,details,created_at&order=created_at.desc&limit=800") || [];
    } catch(_){
      allEvents = [];
    }

    eventMap = {};
    for(const evt of allEvents){
      if(!eventMap[evt.bail_intake_id]) eventMap[evt.bail_intake_id] = [];
      eventMap[evt.bail_intake_id].push(evt);
    }

    renderAll();
    const now = new Date().toLocaleTimeString();
    if(showMessage) setStatus(`Synced ${allRows.length} defendants. Last sync ${now}.`);
  } catch(err){
    console.error(err);
    setStatus("Sync failed: " + err.message, true);
  } finally {
    pendingRefresh = false;
  }
}

function debounceReload(reason){
  setStatus(`Realtime update received: ${reason}. Syncing...`);
  clearTimeout(window.__rtTimer);
  window.__rtTimer = setTimeout(() => loadData(false).then(() => {
    const now = new Date().toLocaleTimeString();
    setStatus(`Realtime synced. Last sync ${now}.`);
  }), 350);
}

async function insertEvent(id,type,label,details){
  await api("/watchtower_events", {
    method:"POST",
    body:{
      bail_intake_id:id,
      event_type:type,
      event_label:label,
      details:details || null
    }
  });
}

async function quickEvent(id,type,label,details){
  try{
    setStatus(label + "...");
    syncOpenCardsFromDom();
    await insertEvent(id,type,label,details);
  } catch(err){
    console.error(err);
    setStatus(label + " failed: " + err.message, true);
  }
}

async function setStatusAction(id,status,label){
  try{
    setStatus(label + "...");
    syncOpenCardsFromDom();
    await api(`/bail_intakes?id=eq.${id}`, {method:"PATCH", body:{status}});
    await insertEvent(id,"status_change",label,`Status changed to ${status}.`);
  } catch(err){
    console.error(err);
    setStatus(label + " failed: " + err.message, true);
  }
}

function openNote(id){
  noteTarget = allRows.find(r => r.id === id) || null;
  if(!noteTarget) return;
  $("noteName").value = noteTarget.defendant_name || noteTarget.name || "";
  $("noteText").value = "";
  $("noteBack").style.display = "flex";
}

function closeNote(){
  $("noteBack").style.display = "none";
  noteTarget = null;
}

async function saveNote(){
  if(!noteTarget){
    setStatus("No defendant selected.", true);
    return;
  }

  const text = $("noteText").value.trim();
  if(!text){
    setStatus("Enter a note first.", true);
    return;
  }

  try{
    $("saveNoteBtn").disabled = true;
    setStatus("Saving note...");
    syncOpenCardsFromDom();
    await insertEvent(noteTarget.id,"field_note","Field Note",text);
    closeNote();
  } catch(err){
    console.error(err);
    setStatus("Note save failed: " + err.message, true);
  } finally {
    $("saveNoteBtn").disabled = false;
  }
}

function openDetails(id){
  const row = allRows.find(r => r.id === id);
  if(!row) return;
  const evs = recentEventsFor(id);

  $("detailContent").innerHTML = `
    <div class="card" style="margin-bottom:12px;padding:14px">
      <div class="name">${esc(row.defendant_name || row.name || "Unnamed")}</div>
      <div class="pillbar" style="margin-top:8px">
        ${statusPill(row.status)}
        ${riskPill(riskScore(row))}
        <span class="pill">${esc(row.county || "No County")}</span>
      </div>
      <div class="grid2" style="margin-top:12px">
        <div class="field"><div class="k">Case #</div><div class="v">${esc(row.case_number || "N/A")}</div></div>
        <div class="field"><div class="k">Court Date</div><div class="v">${esc(row.court_date || "N/A")}</div></div>
        <div class="field"><div class="k">Phone</div><div class="v">${esc(row.phone || "N/A")}</div></div>
        <div class="field"><div class="k">Address</div><div class="v">${esc(row.address || "N/A")}</div></div>
      </div>
    </div>
    <div class="activity">
      ${evs.length ? evs.map(e => `
        <div class="event">
          <div class="t">${esc(e.event_label || e.event_type || "Event")}</div>
          <div class="m">${esc(formatDateTime(e.created_at))}</div>
          <div style="margin-top:6px">${esc(e.details || "")}</div>
        </div>
      `).join("") : '<div class="event"><div class="t">No activity yet</div></div>'}
    </div>
  `;
  $("detailBack").style.display = "flex";
}

function closeDetails(){
  $("detailBack").style.display = "none";
}

function openNew(){
  $("newBack").style.display = "flex";
}

function closeNew(){
  $("newBack").style.display = "none";
}

async function saveNew(){
  const payload = {
    defendant_name:$("f_name").value.trim() || null,
    dob:$("f_dob").value || null,
    phone:$("f_phone").value.trim() || null,
    status:$("f_status").value || "Open",
    county:$("f_county").value.trim() || null,
    case_number:$("f_case").value.trim() || null,
    court_date:$("f_court").value || null,
    address:$("f_address").value.trim() || null,
    cosigner_name:$("f_cosigner").value.trim() || null,
    cosigner_phone:$("f_cosigner_phone").value.trim() || null,
    notes:$("f_notes").value.trim() || null
  };

  if(!payload.defendant_name){
    setStatus("Defendant name is required.", true);
    return;
  }

  try{
    $("saveNewBtn").disabled = true;
    setStatus("Saving defendant...");
    syncOpenCardsFromDom();
    const out = await api("/bail_intakes", {method:"POST", body:payload});
    const id = out?.[0]?.id;
    if(id) await insertEvent(id,"defendant_created","Defendant Added","New defendant added to roster.");
    closeNew();
    ["f_name","f_dob","f_phone","f_county","f_case","f_court","f_address","f_cosigner","f_cosigner_phone","f_notes"].forEach(id => $(id).value = "");
    $("f_status").value = "Open";
  } catch(err){
    console.error(err);
    setStatus("Save failed: " + err.message, true);
  } finally {
    $("saveNewBtn").disabled = false;
  }
}

function formatDateTime(iso){
  if(!iso) return "N/A";
  const d = new Date(iso);
  if(Number.isNaN(d.getTime())) return iso;
  return d.toLocaleString();
}

function setTab(tab){
  currentTab = tab;
  $("tabTargets").classList.toggle("active",tab==="targets");
  $("tabActivity").classList.toggle("active",tab==="activity");
  $("tabHigh").classList.toggle("active",tab==="high");
  renderAll();
}

function startFallbackPolling(){
  clearInterval(pollTimer);
  pollTimer = setInterval(() => loadData(false), 20000);
}

function stopFallbackPolling(){
  clearInterval(pollTimer);
  pollTimer = null;
}

function scheduleReconnect(){
  clearTimeout(reconnectTimer);
  reconnectTimer = setTimeout(() => connectRealtime(), 4000);
}

function connectRealtime(){
  try{
    if(realtimeChannel){
      supabaseClient.removeChannel(realtimeChannel);
      realtimeChannel = null;
    }

    realtimeChannel = supabaseClient
      .channel("watchtower-live")
      .on("postgres_changes", { event: "*", schema: "public", table: "bail_intakes" }, payload => debounceReload(`bail_intakes ${payload.eventType}`))
      .on("postgres_changes", { event: "*", schema: "public", table: "watchtower_events" }, payload => debounceReload(`watchtower_events ${payload.eventType}`))
      .subscribe((status) => {
        if(status === "SUBSCRIBED"){
          setRealtimeState(true, "Realtime live");
          stopFallbackPolling();
          if(lastSyncLabel) setStatus(lastSyncLabel);
        } else if(status === "CHANNEL_ERROR" || status === "TIMED_OUT" || status === "CLOSED"){
          setRealtimeState(false, "Realtime reconnecting");
          startFallbackPolling();
          scheduleReconnect();
        }
      });
  } catch(err){
    console.error(err);
    setRealtimeState(false, "Realtime failed");
    startFallbackPolling();
    scheduleReconnect();
  }
}

if('serviceWorker' in navigator && location.protocol !== 'file:'){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./watchtower_v4_sw.js').catch(err => console.warn('service worker failed', err));
  });
}

window.addEventListener("DOMContentLoaded", () => {
  $("refreshBtnMobile").addEventListener("click", ()=>loadData());
  $("refreshBtnDesktop").addEventListener("click", ()=>loadData());
  $("forcePollBtn").addEventListener("click", ()=>loadData());
  $("newBtnMobile").addEventListener("click", openNew);
  $("newBtnDesktop").addEventListener("click", openNew);
  $("closeNoteBtn").addEventListener("click", closeNote);
  $("saveNoteBtn").addEventListener("click", saveNote);
  $("closeDetailBtn").addEventListener("click", closeDetails);
  $("closeNewBtn").addEventListener("click", closeNew);
  $("saveNewBtn").addEventListener("click", saveNew);
  $("tabTargets").addEventListener("click", ()=>setTab("targets"));
  $("tabActivity").addEventListener("click", ()=>setTab("activity"));
  $("tabHigh").addEventListener("click", ()=>setTab("high"));
  $("noteBack").addEventListener("click", (e)=>{ if(e.target === $("noteBack")) closeNote(); });
  $("detailBack").addEventListener("click", (e)=>{ if(e.target === $("detailBack")) closeDetails(); });
  $("newBack").addEventListener("click", (e)=>{ if(e.target === $("newBack")) closeNew(); });
  ["searchInput","statusFilter","viewFilter","sortFilter"].forEach(id => {
    $(id).addEventListener("input", renderAll);
    $(id).addEventListener("change", renderAll);
  });
  document.addEventListener("visibilitychange", () => { if(!document.hidden) loadData(false); });
  window.addEventListener("online", () => { loadData(false); connectRealtime(); });
  window.addEventListener("offline", () => { setRealtimeState(false, "Offline"); startFallbackPolling(); });
  loadData();
  connectRealtime();
  startFallbackPolling();
});
</script>
